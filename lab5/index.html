<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Базова гра</title>
    <style>
        #game-area {
            position: relative;
            width: 100vw;
            height: 90vh;
            overflow: hidden;
        }

        #target {
            position: absolute;
        }
    </style>
</head>

<body>

    <div id="menu">
        <select id="difficulty">
            <option value="easy">Легко (3 сек, малий розкид)</option>
            <option value="midle">Середній (2 сек, великий розкид)</option>
            <option value="hard">Складно (1 сек, великий розкид)</option>
        </select>

        <input type="color" id="square-color" value="#ff0000">

        <button id="start-btn">Почати гру</button>
    </div>

    <div id="game-container" style="display: none;">
        <div>Очки: <span id="score">0</span> | Час: <span id="time">0.0</span> с</div>

        <div id="game-area">
            <div id="target"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
